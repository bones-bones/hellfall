name: Manual Deploy Server (Cloud Run)

on:
  workflow_dispatch:

jobs:
  deploy:
    if: github.actor == 'bones-bones'
    runs-on: ubuntu-latest
    env:
      GCP_AUTH_SERVER_PROJECT_ID: ${{ vars.GCP_AUTH_SERVER_PROJECT_ID }}
      AUTH_CLOUD_RUN_SERVICE_NAME: ${{ vars.AUTH_CLOUD_RUN_SERVICE_NAME }}
      AUTH_CLOUD_RUN_REGION: ${{ vars.AUTH_CLOUD_RUN_REGION }}
      CLOUD_RUN_SOURCE_DIR: ${{ vars.CLOUD_RUN_SOURCE_DIR || '.' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CLOUD_RUN_AUTH_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_AUTH_SERVER_PROJECT_ID }}

      - name: Deploy auth server to Cloud Run
        run: |
          gcloud run deploy "$AUTH_CLOUD_RUN_SERVICE_NAME" \
            --source "$CLOUD_RUN_SOURCE_DIR" \
            --project "$GCP_AUTH_SERVER_PROJECT_ID" \
            --region "$AUTH_CLOUD_RUN_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --quiet

      - name: Regenerate catalog cache
        env:
          CATALOG_SYNC_API_KEY: ${{ secrets.CATALOG_SYNC_API_KEY }}
        run: |
          if [ -z "$CATALOG_SYNC_API_KEY" ]; then
            echo "CATALOG_SYNC_API_KEY secret is not set; skipping catalog sync"
            exit 0
          fi

          SERVICE_URL=$(gcloud run services describe "$AUTH_CLOUD_RUN_SERVICE_NAME" \
            --region "$AUTH_CLOUD_RUN_REGION" \
            --project "$GCP_AUTH_SERVER_PROJECT_ID" \
            --format 'value(status.url)')

          echo "Publishing catalog via $SERVICE_URL/api/admin/catalog/sync"
          HTTP_CODE=$(curl -sS -o /tmp/catalog-sync.json -w '%{http_code}' \
            -X POST "$SERVICE_URL/api/admin/catalog/sync" \
            -H "Authorization: Bearer $CATALOG_SYNC_API_KEY" \
            -H "Content-Type: application/json")
          cat /tmp/catalog-sync.json
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Catalog sync failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Tag deploy
        run: |
          TAG="auth-server/$(date -u +%Y.%m.%d).${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "${GITHUB_SHA}"
          git push origin "refs/tags/$TAG"
