name: Manual Deploy Hellfall

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: Firebase/GCP project ID
        required: true
        default: skeleton-club

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/sa_key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa_key.json" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: |
          firebase deploy \
            --only "hosting:${{ secrets.FIREBASE_HOSTING_TARGET }}" \
            --project "${{ inputs.project_id }}" \
            --non-interactive
