name: Manual Deploy Hellfall

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      FIREBASE_HOSTING_SITE_ID: ${{ vars.FIREBASE_HOSTING_SITE_ID }}
      FIREBASE_HOSTING_TARGET: ${{ vars.FIREBASE_HOSTING_TARGET }}
      FIREBASE_HOSTING_PUBLIC: ${{ vars.FIREBASE_HOSTING_PUBLIC }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Enable Corepack and Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.14.1 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared declarations
        run: yarn exec tsc -p packages/shared/tsconfig.json --emitDeclarationOnly

      - name: Build frontend
        run: yarn build

      - name: Write firebase.json and .firebaserc
        run: |
          jq -n \
            --arg t "$FIREBASE_HOSTING_TARGET" \
            --arg p "$FIREBASE_HOSTING_PUBLIC" \
            '{hosting: [{target: $t, public: $p, ignore: ["firebase.json", "**/.*", "**/node_modules/**"]}]}' \
            > firebase.json
          jq -n \
            --arg pid "$GCP_PROJECT_ID" \
            --arg target "$FIREBASE_HOSTING_TARGET" \
            --arg sid "$FIREBASE_HOSTING_SITE_ID" \
            '{projects: {default: $pid}, targets: {($pid): {hosting: {($target): [$sid]}}}}' \
            > .firebaserc

      - name: Debug hosting config (safe)
        run: |
          echo "firebase.json"
          jq '.' firebase.json
          echo ".firebaserc"
          jq '.' .firebaserc
          echo "env summary"
          echo "GCP_PROJECT_ID=${GCP_PROJECT_ID}"
          echo "FIREBASE_HOSTING_TARGET=${FIREBASE_HOSTING_TARGET}"
          echo "FIREBASE_HOSTING_SITE_ID=${FIREBASE_HOSTING_SITE_ID}"
          echo "FIREBASE_HOSTING_PUBLIC=${FIREBASE_HOSTING_PUBLIC}"

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/sa_key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa_key.json" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: |
          firebase deploy \
            --only "hosting:${FIREBASE_HOSTING_TARGET}" \
            --project "$GCP_PROJECT_ID" \
            --non-interactive
