name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack and Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.14.1 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn fix

      - name: Build shared package
        run: yarn exec tsc -p packages/shared/tsconfig.json --emitDeclarationOnly

      - name: Type check
        run: yarn exec tsc -p packages/frontend/tsconfig.json --noEmit

      - name: Build
        run: yarn build
