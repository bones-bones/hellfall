name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  build:
    # if: github.actor == 'bones-bones'
    runs-on: ubuntu-latest
    env:
      REACT_APP_AUTH_API_URL: ${{ vars.REACT_APP_AUTH_API_URL }}
      CARD_CATALOG_URL: ${{ vars.CARD_CATALOG_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.14.1 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn fix

      - name: Build shared package
        run: yarn exec tsc -p packages/shared/tsconfig.json --emitDeclarationOnly

      - name: Type check frontend
        run: yarn exec tsc -p packages/frontend/tsconfig.json --noEmit

      - name: Type check server
        run: yarn exec tsc -p packages/server/tsconfig.json --noEmit

      - name: Type check scripts
        run: yarn exec tsc -p packages/scripts/tsconfig.json --noEmit

      - name: Type check backend
        run: yarn exec tsc -p packages/backend/tsconfig.json --noEmit

      - name: Build
        run: yarn build
