name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
          
      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn fix

      - name: Type check
        run: yarn tsc --noEmit --skipLibCheck | grep -v "PillSearch.tsx" || true

      - name: Build
        run: yarn build
