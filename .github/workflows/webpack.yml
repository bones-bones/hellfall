name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
          
      - name: Debug lockfile state
        run: |
          echo "=== Current branch and commit ==="
          git branch
          git log -1 --oneline
          echo "=== yarn.lock status ==="
          git status yarn.lock
          echo "=== Check if yarn.lock is in .gitignore ==="
          git check-ignore yarn.lock || echo "Not ignored"
          echo "=== First 10 lines of yarn.lock ==="
          head -10 yarn.lock
          echo "=== package.json dependencies ==="
          cat package.json | grep -A 10 '"dependencies"'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn fix

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: yarn build
