name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Debug ESLint config
        run: |
          echo "=== ESLint config being used ==="
          cd packages/frontend
          npx eslint --print-config src/some-file.ts | grep -B5 -A5 eqeqeq || echo "eqeqeq rule not found in config"
          echo "=== ESLint version ==="
          npx eslint --version
        continue-on-error: true  # Don't fail the workflow if debug fails

      - name: Lint
        run: yarn fix

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: yarn build
